kind = "web"
previewPath = "/"
title = "FreshNode — Investor Pitch"
version = "1.0.0"
id = "artifacts/freshnode"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20326

[services.development]
run = "pnpm --filter @workspace/freshnode run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/freshnode", "run", "build" ]
publicDir = "artifacts/freshnode/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20326"
BASE_PATH = "/"
